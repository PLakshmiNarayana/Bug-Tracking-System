<div class="login-page">

  <div class="login-left">
    <div class="left-content">
      <a routerLink="/" class="brand">
        <div class="brand-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
        </div>
        <span>BugTracker</span>
      </a>
      <div class="left-hero">
        <h2 class="left-title">Create a new<br>password</h2>
        <p class="left-sub">Choose a strong password to secure your account.</p>
      </div>
    </div>
    <div class="left-bg-circle"></div>
    <div class="left-bg-grid"></div>
  </div>

  <div class="login-right">
    <div class="form-card">

      <div class="form-header">
        <h1 class="form-title">New Password</h1>
        <p class="form-sub">Enter and confirm your new password</p>
      </div>

      <div class="form-body">

        <div *ngIf="!success">
          <div class="field-group">
            <label class="field-label" for="password">New Password</label>
            <div class="field-wrap">
              <span class="field-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input
                id="password"
                class="field-input"
                type="password"
                placeholder="Enter new password"
                [(ngModel)]="password"
              />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" for="confirmPassword">Confirm Password</label>
            <div class="field-wrap">
              <span class="field-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input
                id="confirmPassword"
                class="field-input"
                type="password"
                placeholder="Confirm new password"
                [(ngModel)]="confirmPassword"
              />
            </div>
          </div>

          <div *ngIf="errorMsg" style="color:red; font-size:13px; margin-bottom:12px;">
            {{ errorMsg }}
          </div>

          <button class="btn-login" (click)="resetPassword()" [disabled]="loading">
            {{ loading ? 'Resetting...' : 'Reset Password' }}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>

        <div *ngIf="success" style="text-align:center; padding:24px 0;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          <p style="font-size:16px; font-weight:600; margin-top:12px;">Password reset successful!</p>
          <p style="font-size:13px; color:#888; margin-top:4px;">Redirecting to login...</p>
        </div>

        <div class="form-divider">
          <span>Remember your password?</span>
        </div>

        <a routerLink="/login" class="btn-register">
          Back to Sign In
        </a>

      </div>
    </div>
  </div>
</div>
