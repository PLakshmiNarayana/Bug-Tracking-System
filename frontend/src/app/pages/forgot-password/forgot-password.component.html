<div class="login-page">

  <div class="login-left">
    <div class="left-content">
      <a routerLink="/" class="brand">
        <div class="brand-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
        </div>
        <span>BugTracker</span>
      </a>
      <div class="left-hero">
        <h2 class="left-title">Forgot your<br>password?</h2>
        <p class="left-sub">No worries — we'll send you a reset link to your email.</p>
      </div>
    </div>
    <div class="left-bg-circle"></div>
    <div class="left-bg-grid"></div>
  </div>

  <div class="login-right">
    <div class="form-card">

      <div class="form-header">
        <h1 class="form-title">Reset Password</h1>
        <p class="form-sub">Enter your email to receive a reset link</p>
      </div>

      <div class="form-body">

        <div *ngIf="!submitted">
          <div class="field-group">
            <label class="field-label" for="email">Email address</label>
            <div class="field-wrap">
              <span class="field-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
              <input
                id="email"
                class="field-input"
                type="email"
                placeholder="you@example.com"
                [(ngModel)]="email"
              />
            </div>
          </div>

          <div *ngIf="errorMsg" style="color:red; font-size:13px; margin-bottom:12px;">
            {{ errorMsg }}
          </div>

          <button class="btn-login" (click)="sendResetLink()" [disabled]="loading">
            {{ loading ? 'Sending...' : 'Send Reset Link' }}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>

        <div *ngIf="submitted" style="text-align:center; padding:24px 0;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          <p style="font-size:16px; font-weight:600; margin-top:12px;">Reset link sent!</p>
          <p style="font-size:13px; color:#888; margin-top:4px;">Check your email inbox and click the link to reset your password.</p>
        </div>

        <div class="form-divider">
          <span>Remember your password?</span>
        </div>

        <a routerLink="/login" class="btn-register">
          Back to Sign In
        </a>

      </div>
    </div>
  </div>
</div>
