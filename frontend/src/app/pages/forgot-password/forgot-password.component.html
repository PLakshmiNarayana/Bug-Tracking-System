<div class="page-wrapper">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
        </svg>
      </div>
      <span class="logo-text">BugTracker</span>
    </div>

    <!-- Success State -->
    <div class="success-state" *ngIf="submitted">
      <div class="success-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2 class="success-title">Check your email</h2>
      <p class="success-sub">We sent a password reset link to <strong>{{ email }}</strong></p>
      <p class="success-note">Didn't receive it? Check your spam folder.</p>
      <a routerLink="/login" class="btn-back">Back to Sign In</a>
    </div>

    <!-- Form State -->
    <div *ngIf="!submitted">
      <div class="card-header">
        <div class="lock-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1 class="card-title">Forgot Password?</h1>
        <p class="card-sub">No worries! Enter your email and we'll send you a reset link.</p>
      </div>

      <div class="form-body">
        <div class="field-group">
          <label class="field-label">Email address</label>
          <div class="field-wrap" [class.field-error]="errorMsg">
            <span class="field-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              class="field-input"
              type="email"
              placeholder="you@example.com"
              [(ngModel)]="email"
            />
          </div>
          <div class="error-msg" *ngIf="errorMsg">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ errorMsg }}
          </div>
        </div>

        <button class="btn-submit" (click)="sendResetLink()" [disabled]="loading">
          <span *ngIf="!loading">
            Send Reset Link
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </span>
          <span *ngIf="loading" class="spinner-wrap">
            <span class="spinner"></span>
            Sending...
          </span>
        </button>

        <a routerLink="/login" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back to Sign In
        </a>

      </div>
    </div>

  </div>
</div>
