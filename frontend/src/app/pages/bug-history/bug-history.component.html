<div class="history-page">

  <app-sidebar></app-sidebar>

  <main class="main-content">

    <header class="topbar">
      <div class="topbar-left">
        <a routerLink="/bugs" class="btn-back">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to Bugs
        </a>
        <div>
          <h1 class="page-title">Bug History</h1>
          <p class="page-sub">Change log for this bug</p>
        </div>
      </div>
      <div class="history-count" *ngIf="history.length > 0">
        {{ history.length }} change{{ history.length !== 1 ? 's' : '' }}
      </div>
    </header>

    <!-- EMPTY STATE -->
    <div class="empty-state" *ngIf="history.length === 0">
      <div class="empty-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <p class="empty-title">No history yet</p>
      <p class="empty-sub">Status changes for this bug will appear here.</p>
    </div>

    <!-- TIMELINE -->
    <div class="timeline" *ngIf="history.length > 0">
      <div class="timeline-item" *ngFor="let h of history; let last = last">

        <div class="timeline-left">
          <div class="timeline-dot">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </div>
          <div class="timeline-line" *ngIf="!last"></div>
        </div>

        <div class="timeline-card">
          <!-- ✅ Fixed: was h.oldStatus/h.newStatus → h.action (backend stores the full action string) -->
          <p class="activity-message">{{ h.action }}</p>

          <div class="history-meta">
            <span class="meta-item">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <!-- ✅ Fixed: was h.changedBy → h.performedBy -->
              {{ h.performedBy }}
            </span>
            <span class="meta-dot">·</span>
            <span class="meta-item">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <!-- ✅ Fixed: was h.changedAt → h.timestamp -->
              {{ h.timestamp | date:'MMM d, y · h:mm a' }}
            </span>
          </div>

        </div>

      </div>
    </div>

  </main>
</div>
